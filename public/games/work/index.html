<head>
    <style>
        *{
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-wrapper {
            position: relative;
            width: 1000px;
            height: 576px;
        }
        canvas {
            display: block;
        }
    </style>
    <script>
        function scaleGame() {
            var wrapper = document.querySelector('.game-wrapper');
            if (!wrapper) return;
            var scaleX = window.innerWidth / 1000;
            var scaleY = window.innerHeight / 576;
            var scale = Math.min(scaleX, scaleY);
            wrapper.style.zoom = scale;
        }
        window.addEventListener('resize', scaleGame);
        window.addEventListener('load', scaleGame);
    </script>
</head>
<body>
    <div class="game-wrapper">
        <div style="
            position: absolute; 
            display: flex; 
            width: 100%; 
            align-items: center; 
            padding: 20px;">
            <!--player health-->
            <div style="
                position: relative; 
                width: 100%; 
                display: flex; 
                justify-content: flex-end;
                border-top: 3px solid white;
                border-bottom: 3px solid white;
                border-left: 3px solid white;">
                <div style="
                    background-color: crimson; 
                    height: 30px; 
                    width: 100%;"></div>
                <div id="playerHealth" style="
                    position: absolute; 
                    background:rgb(105, 102, 173); 
                    top: 0; 
                    right: 0; 
                    bottom: 0; 
                    width: 100%;"></div>
            </div>
            <!--timer-->
            <div id="timer" style="
                background-color: rgb(59, 59, 59); 
                color: white;
                height: 100px; 
                width: 100px; 
                flex-shrink: 0; 
                display: flex; 
                align-items: center; 
                justify-content: center;
                font-size: 3rem;
                border: 3px solid white;
                font-weight: bold;" >10</div>
            <!--enemy health-->
            <div style="
                position: relative; 
                width: 100%; 
                display: flex; 
                justify-content: flex-end;
                border-top: 3px solid white;
                border-bottom: 3px solid white;
                border-right: 3px solid white;">
                <div style="
                    background-color: crimson; 
                    height: 30px; 
                    width: 100%;"></div>
                <div id="enemyHealth" style="
                    position: absolute; 
                    background: rgb(105, 102, 173); 
                    top: 0; 
                    right: 0; 
                    bottom: 0; 
                    width: 100%;"></div>
            </div>
        </div>
        <div id="displayText" style="
            position: absolute;
            color: white;  
            justify-content: center; 
            align-items: center;
            top: 0;
            right: 0;
            left: 0;
            bottom: 0;
            display: none; 
            font-weight: 800;
            font-size: 3rem;">Tie</div>
            
        <canvas></canvas>
    </div>
    <script src="js/utils.js"></script>
    <script src="js/classes.js"></script>
    <script src="index.js"></script>

</body>
